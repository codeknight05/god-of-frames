# God of Frames settings
# Edit this file and restart the app.

interval_seconds=1
fps_threshold=55
auto_elevate=true
open_ui_on_start=true
# Optional relay URL to collect feedback from all users:
# Example: http://YOUR_SERVER:8787/api/ingest
feedback_endpoint=
# Optional update manifest endpoint for future update checks:
# Example: http://YOUR_SERVER:8790/api/version
update_manifest_url=

# Use semicolon-separated exe names
game_processes=helldivers2.exe;forhonor.exe

# TRIM_BACKGROUND_APPS candidates (semicolon-separated)
trim_targets=Overwolf.exe;RadeonSoftware.exe;XboxPcApp.exe

# Never terminate these apps, even if in trim targets
protected_apps=Discord.exe;Steam.exe

